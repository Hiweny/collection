<style>
.daily{border-radius:34px;overflow:hidden;opacity:.01;transform:translateY(10px) scale(.992);transition:opacity .72s ease,transform .72s ease,box-shadow .72s ease;background-clip:padding-box}
.daily.daily-ready{opacity:1;transform:none}
.daily-shade{z-index:3}
.daily h1{letter-spacing:-.045em;line-height:1.04;text-wrap:balance}
.daily p{display:inline-flex;margin-top:4px;padding:7px 12px;border:1px solid rgba(246,241,232,.18);border-radius:999px;background:rgba(18,23,34,.34);backdrop-filter:blur(12px);font-size:clamp(14px,1.8vw,18px);color:rgba(246,241,232,.76)}
.scroll-rail{position:fixed;z-index:50;right:6px;top:92px;bottom:22px;width:18px;opacity:0;pointer-events:none;transition:opacity .22s ease}
.scroll-rail:before{content:'';position:absolute;top:0;bottom:0;left:8px;width:2px;border-radius:99px;background:rgba(246,241,232,.10)}
.scroll-thumb{position:absolute;right:2px;top:0;width:8px;min-height:48px;border-radius:99px;background:linear-gradient(180deg,rgba(246,241,232,.72),rgba(98,144,155,.72));box-shadow:0 8px 24px rgba(0,0,0,.34),0 0 0 1px rgba(246,241,232,.16);cursor:grab;touch-action:none}
.scroll-thumb:active{cursor:grabbing;background:linear-gradient(180deg,rgba(255,255,255,.90),rgba(199,132,68,.76))}
body.scroll-fast .scroll-rail,.scroll-rail.dragging{opacity:1;pointer-events:auto}
@media(hover:hover){.scroll-rail:hover{opacity:1;pointer-events:auto}}
@media(max-width:560px){.daily{border-radius:30px}.daily h1{font-size:clamp(34px,9.5vw,44px);letter-spacing:-.05em}.daily p{font-size:14px}.scroll-rail{right:2px;top:82px;bottom:16px;width:14px}.scroll-thumb{right:1px;width:6px}}
/* ---- Splash Screen ---- */
#splash{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#2C303B;transition:opacity .5s ease,visibility .5s ease}
#splash.splash-hide{opacity:0;visibility:hidden;pointer-events:none}
#splash .splash-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.45;transition:opacity .8s ease}
#splash .splash-logo{width:88px;height:88px;border-radius:22px;background:linear-gradient(135deg,var(--snow) 0 31%,var(--sky) 31% 67%,var(--amber) 67%);box-shadow:0 24px 64px rgba(0,0,0,.4);margin-bottom:24px;z-index:1;animation:splashPulse 1.2s ease-in-out infinite}
#splash .splash-title{font-size:28px;font-weight:850;letter-spacing:.06em;color:var(--snow);z-index:1;text-shadow:0 2px 12px rgba(0,0,0,.3)}
#splash .splash-sub{font-size:14px;color:rgba(246,241,232,.56);margin-top:8px;z-index:1}
@keyframes splashPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

<body>
<div id="splash"><div class="splash-bg" id="splashBg"></div><div class="splash-logo"></div><div class="splash-title">雪线之上</div><div class="splash-sub">收藏风经过的链接</div></div>
<div class="wrap">
<header class="top"><div class="brand"><div class="logo"></div><div><b>雪线之上</b><span>Local Media Collection</span></div></div><div class="top-actions"><button data-filter="all" class="pill active">全部</button><button data-filter="image" class="pill">图片</button><button data-filter="video" class="pill">视频</button></div></header>
<section class="daily card" id="dailyCover"><div class="daily-shade"><span class="eyebrow">TODAY'S GLIMPSE</span><h1 id="dailyTitle">正在等待一句合适的话。</h1><p id="dailyText">从收藏里，捡一束光</p></div></section>
<section class="parser card"><h2>添加收藏</h2><textarea id="source" placeholder="粘贴分享文案 / 抖音链接 / 小红书链接 / 图片 URL"></textarea><div class="parser-row"><select id="api"><option value="auto">自动选择接口</option><option value="douyin">抖音 API</option><option value="xhs">小红书 API</option><option value="short">短视频聚合 API</option><option value="direct-image">直接图片 URL</option></select><button id="parseBtn" class="btn primary">解析并收藏</button><button id="manualBtn" class="btn">手动收藏</button></div><p id="status" class="hint"></p></section>
<section><div class="toolbar"><input id="q" class="input" placeholder="搜索标题、平台、链接……"><div><button id="exportBtn" class="pill">导出 JSON</button><label class="pill file">导入 JSON<input id="importFile" type="file" accept="application/json"></label><button id="clearBtn" class="pill danger">清空</button></div></div><div id="grid" class="grid"></div><div id="empty" class="empty card">暂无收藏。</div></section>
<section class="hero hero-bottom"><div class="hero-main card"><span class="eyebrow">ABOVE THE SNOWLINE</span><h1>收藏风经过的链接</h1></div><aside class="side card"><div><strong id="total">0</strong><span>全部收藏</span></div><div><strong id="imgs">0</strong><span>图片</span></div><div><strong id="vids">0</strong><span>视频</span></div></aside></section>
<p class="foot">本页面由 Hiweny 制作</p>
</div>
<div class="scroll-rail" id="scrollRail" aria-hidden="true"><div class="scroll-thumb" id="scrollThumb"></div></div>
<script>
(function(){
  const KEY='snowline_media_collection_v2';
  const esc=s=>String(s||'').replace(/["\\]/g,'');
  function setReady(box){requestAnimationFrame(()=>box.classList.add('daily-ready'))}
  function pickCover(){
    const box=document.getElementById('dailyCover');
    if(!box)return;
    try{
      let stored=localStorage.getItem(KEY)||localStorage.getItem('snowline_media_collection_v1');
      const data=JSON.parse(stored||'{}');
      const items=Array.isArray(data.items)?data.items:[];
      const imgs=items.flatMap(i=>Array.isArray(i.mediaUrls)&&i.mediaUrls.length?i.mediaUrls:(i.coverUrl?[i.coverUrl]:[])).filter(Boolean);
      if(imgs.length){
        const u=imgs[Math.floor(Math.random()*imgs.length)];
        const img=new Image();
        img.onload=function(){box.style.backgroundImage='linear-gradient(145deg,rgba(98,144,155,.16),rgba(44,48,59,.38)),url("'+esc(u)+'")';setReady(box)};
        img.onerror=function(){setReady(box)};
        img.src=u;
      }else{setReady(box)}
    }catch(e){setReady(box)}
  }
  async function loadYiyan(){
    const title=document.getElementById('dailyTitle');
    if(!title)return;
    try{
      const r=await fetch('https://api.bugpk.com/api/yiyan');
      const s=await r.text();
      const parts=s.split('/&/');
      title.textContent=(parts[1]||parts[0]||'把喜欢的画面，留在风经过的地方。').trim();
    }catch(e){title.textContent='把喜欢的画面，留在风经过的地方。'}
  }
  pickCover();
  loadYiyan();
})();
(function(){
  const rail=document.getElementById('scrollRail');
  const thumb=document.getElementById('scrollThumb');
  if(!rail||!thumb)return;
  let lastY=window.scrollY,lastT=performance.now(),hideTimer=0,drag=false,startY=0,startScroll=0;
  function maxScroll(){return Math.max(1,document.documentElement.scrollHeight-window.innerHeight)}
  function update(){
    const railH=rail.clientHeight;
    const ratio=Math.min(1,window.innerHeight/document.documentElement.scrollHeight);
    const h=Math.max(48,Math.round(railH*ratio));
    const y=Math.round((railH-h)*(window.scrollY/maxScroll()));
    thumb.style.height=h+'px';
    thumb.style.transform='translateY('+y+'px)';
    rail.style.display=maxScroll()>2?'block':'none';
  }
  function show(force){
    document.body.classList.add('scroll-fast');
    clearTimeout(hideTimer);
    if(!force)hideTimer=setTimeout(()=>document.body.classList.remove('scroll-fast'),760);
  }
  function onScroll(){
    const now=performance.now(),y=window.scrollY;
    const speed=Math.abs(y-lastY)/Math.max(16,now-lastT);
    update();
    if(speed>.55||drag)show(drag);
    lastY=y;lastT=now;
  }
  thumb.addEventListener('pointerdown',e=>{
    drag=true;startY=e.clientY;startScroll=window.scrollY;rail.classList.add('dragging');thumb.setPointerCapture(e.pointerId);show(true);e.preventDefault();
  });
  thumb.addEventListener('pointermove',e=>{
    if(!drag)return;
    const railH=rail.clientHeight,thumbH=thumb.offsetHeight;
    const delta=e.clientY-startY;
    const scrollDelta=delta/Math.max(1,railH-thumbH)*maxScroll();
    window.scrollTo({top:startScroll+scrollDelta,behavior:'auto'});
  });
  function endDrag(){drag=false;rail.classList.remove('dragging');show(false)}
  thumb.addEventListener('pointerup',endDrag);
  thumb.addEventListener('pointercancel',endDrag);
  window.addEventListener('scroll',onScroll,{passive:true});
  window.addEventListener('resize',update,{passive:true});
  update();
})();
</script>
<script src="./app.js?v=pwa-1"></script>
<script>
// ---- PWA: Service Worker ----
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js?v=pwa-1').catch(()=>{});
}
// ---- Splash: random image from collection ----
(function(){
  var splash=document.getElementById('splash');
  var splashBg=document.getElementById('splashBg');
  var KEY='snowline_media_collection_v2';
  try{
    var stored=localStorage.getItem(KEY)||localStorage.getItem('snowline_media_collection_v1');
    var data=JSON.parse(stored||'{}');
    var items=Array.isArray(data.items)?data.items:[];
    var imgs=items.flatMap(function(i){return Array.isArray(i.mediaUrls)&&i.mediaUrls.length?i.mediaUrls:(i.coverUrl?[i.coverUrl]:[])}).filter(Boolean);
    if(imgs.length){
      var u=imgs[Math.floor(Math.random()*imgs.length)];
      var img=new Image();
      img.onload=function(){splashBg.style.backgroundImage='url("'+u.replace(/"/g,'')+'")'};
      img.src=u;
    }
  }catch(e){}
  window.addEventListener('load',function(){
    setTimeout(function(){splash.classList.add('splash-hide')},600);
  });
})();
</script>
