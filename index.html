<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>雪线之上 · Media Collection</title>
<style>
:root{--sky:#62909B;--amber:#C78444;--blue:#2C303B;--oat:#AB977E;--snow:#F6F1E8;--muted:rgba(246,241,232,.68);--line:rgba(246,241,232,.16);--glass:rgba(44,48,59,.66);--shadow:0 24px 70px rgba(0,0,0,.28);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--snow);background:radial-gradient(circle at 8% 4%,rgba(98,144,155,.65),transparent 34rem),radial-gradient(circle at 88% 12%,rgba(199,132,68,.28),transparent 26rem),linear-gradient(145deg,#1b1f29,var(--blue) 52%,#121722)}a{color:inherit}.wrap{width:min(1180px,calc(100% - 32px));margin:auto;padding:22px 0 52px}header{position:sticky;top:12px;z-index:5;display:flex;justify-content:space-between;align-items:center;gap:14px;padding:12px 14px;border:1px solid var(--line);border-radius:999px;background:rgba(44,48,59,.72);backdrop-filter:blur(18px);box-shadow:0 10px 40px rgba(0,0,0,.18)}.brand{display:flex;align-items:center;gap:12px}.logo{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--snow) 0 31%,var(--sky) 31% 67%,var(--amber) 67%);box-shadow:0 10px 24px rgba(0,0,0,.22)}.brand b{display:block;letter-spacing:.08em}.brand span{display:block;color:var(--muted);font-size:12px;margin-top:2px}.nav{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.pill{border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--snow);border-radius:999px;padding:9px 13px;cursor:pointer;text-decoration:none;transition:.2s}.pill:hover,.pill.active{transform:translateY(-1px);border-color:rgba(199,132,68,.55);background:rgba(199,132,68,.22)}.hero{margin:54px 0 24px;display:grid;grid-template-columns:1.1fr .9fr;gap:20px}.card{border:1px solid var(--line);border-radius:28px;background:linear-gradient(145deg,rgba(246,241,232,.12),rgba(44,48,59,.48));backdrop-filter:blur(18px);box-shadow:var(--shadow);overflow:hidden}.hero-main{padding:clamp(26px,5vw,58px);min-height:390px;position:relative}.hero-main:after{content:'';position:absolute;right:-120px;bottom:-160px;width:420px;height:420px;border-radius:50%;background:conic-gradient(from 220deg,transparent,rgba(98,144,155,.55),rgba(199,132,68,.38),transparent 70%);filter:blur(2px)}.eyebrow{display:inline-flex;align-items:center;gap:9px;border:1px solid rgba(98,144,155,.42);background:rgba(98,144,155,.18);border-radius:999px;padding:8px 12px;color:var(--muted);font-size:13px;letter-spacing:.08em}.dot{width:8px;height:8px;border-radius:50%;background:var(--amber);box-shadow:0 0 20px var(--amber)}h1{margin:20px 0 16px;font-size:clamp(42px,8vw,84px);line-height:.95;letter-spacing:-.075em}.hero p{position:relative;z-index:1;margin:0;color:var(--muted);line-height:1.9}.actions{position:relative;z-index:1;display:flex;gap:12px;flex-wrap:wrap;margin-top:28px}.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 17px;border-radius:999px;border:1px solid rgba(199,132,68,.45);background:var(--amber);color:#181b22;text-decoration:none;font-weight:800}.btn.ghost{background:rgba(255,255,255,.06);color:var(--snow);border-color:var(--line)}.side{padding:22px;display:grid;gap:14px}.stat{padding:18px;border:1px solid var(--line);border-radius:22px;background:rgba(255,255,255,.055)}.stat strong{display:block;font-size:34px}.stat span{color:var(--muted);font-size:13px}.toolbar{display:grid;grid-template-columns:1fr auto;gap:12px;margin:24px 0}.search{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.08);color:var(--snow);padding:14px 16px;border-radius:18px;outline:none}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.item{position:relative;border:1px solid var(--line);border-radius:24px;background:rgba(246,241,232,.08);overflow:hidden;box-shadow:0 12px 36px rgba(0,0,0,.16);transition:.22s}.item:hover{transform:translateY(-3px);border-color:rgba(199,132,68,.45)}.media{aspect-ratio:4/5;background:linear-gradient(145deg,rgba(98,144,155,.45),rgba(171,151,126,.2));display:grid;place-items:center;overflow:hidden}.media img,.media video{width:100%;height:100%;object-fit:cover;display:block}.empty{padding:42px;text-align:center;color:var(--muted)}.body{padding:16px}.meta{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px}.tag{border:1px solid rgba(98,144,155,.4);color:var(--snow);background:rgba(98,144,155,.2);border-radius:999px;padding:5px 9px;font-size:12px}.type{color:var(--oat);font-size:12px}.title{font-weight:850;line-height:1.4;margin:0 0 9px}.url{display:block;color:rgba(246,241,232,.56);font-family:ui-monospace,monospace;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-decoration:none}.links{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.small{padding:8px 10px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.06);font-size:12px;text-decoration:none}.footer{margin-top:34px;color:rgba(246,241,232,.48);font-size:13px;text-align:center}.hidden{display:none!important}@media(max-width:860px){.hero{grid-template-columns:1fr}.grid{grid-template-columns:1fr 1fr}header{align-items:flex-start;border-radius:24px}.nav{display:none}.toolbar{grid-template-columns:1fr}.side{grid-template-columns:repeat(3,1fr)}}@media(max-width:560px){.wrap{width:min(100% - 22px,1180px)}.grid{grid-template-columns:1fr}.side{grid-template-columns:1fr}.hero{margin-top:32px}.hero-main{min-height:auto}h1{font-size:48px}}
</style>
</head>
<body>
<div class="wrap">
<header><div class="brand"><div class="logo"></div><div><b>雪线之上</b><span>Media Collection</span></div></div><nav class="nav"><button class="pill active" data-filter="all">全部</button><button class="pill" data-filter="image">图片</button><button class="pill" data-filter="video">视频</button><a class="pill" href="./data/collection.json">数据</a></nav></header>
<section class="hero"><div class="card hero-main"><span class="eyebrow"><i class="dot"></i> ABOVE THE SNOWLINE</span><h1>收藏风经过的链接。</h1><p>这里收纳来自抖音、小红书、快手等公开分享内容的图片与视频直链。长空青作底，琥珀作光，普鲁士蓝压住夜色，燕麦色留下温度。</p><div class="actions"><a class="btn" href="#collection">查看收藏</a><a class="btn ghost" href="https://github.com/Hiweny/collection">GitHub 仓库</a></div></div><aside class="card side"><div class="stat"><strong id="total">0</strong><span>全部收藏</span></div><div class="stat"><strong id="imgs">0</strong><span>图片项目</span></div><div class="stat"><strong id="vids">0</strong><span>视频项目</span></div></aside></section>
<section id="collection"><div class="toolbar"><input id="q" class="search" placeholder="搜索标题、平台、标签……"><div><button class="pill active" data-filter="all">全部</button><button class="pill" data-filter="image">图片</button><button class="pill" data-filter="video">视频</button></div></div><div id="grid" class="grid"></div><div id="empty" class="card empty hidden">还没有收藏。把抖音或小红书分享链接甩给雨檐，我会帮你提取直链并写进这里。</div></section><p class="footer">Designed with 长空青 #62909B · 琥珀 #C78444 · 普鲁士蓝 #2C303B · 燕麦色 #AB977E</p>
</div>
<script>
let items=[],filter='all';const grid=document.getElementById('grid'),empty=document.getElementById('empty'),q=document.getElementById('q');function pickCover(it){return it.coverUrl||(it.mediaUrls&&it.mediaUrls[0])||''}function card(it){const cover=pickCover(it);const isV=it.type==='video'||it.videoUrl;const media=isV&&it.videoUrl?`<video src="${it.videoUrl}" poster="${cover}" controls preload="metadata"></video>`:cover?`<img src="${cover}" loading="lazy" referrerpolicy="no-referrer">`:`<span>NO PREVIEW</span>`;const links=[it.sourceUrl&&`<a class="small" target="_blank" href="${it.sourceUrl}">原链接</a>`,it.videoUrl&&`<a class="small" target="_blank" href="${it.videoUrl}">视频直链</a>`,...(it.mediaUrls||[]).slice(0,3).map((u,i)=>`<a class="small" target="_blank" href="${u}">图片${i+1}</a>`)].filter(Boolean).join('');return `<article class="item"><div class="media">${media}</div><div class="body"><div class="meta"><span class="tag">${it.platform||'unknown'}</span><span class="type">${it.type||'media'}</span></div><p class="title">${it.title||'Untitled'}</p><a class="url" href="${it.sourceUrl||'#'}" target="_blank">${it.sourceUrl||''}</a><div class="links">${links}</div></div></article>`}function render(){const key=q.value.trim().toLowerCase();const list=items.filter(it=>(filter==='all'||it.type===filter)&&JSON.stringify(it).toLowerCase().includes(key));grid.innerHTML=list.map(card).join('');empty.classList.toggle('hidden',list.length>0);document.getElementById('total').textContent=items.length;document.getElementById('imgs').textContent=items.filter(i=>i.type==='image').length;document.getElementById('vids').textContent=items.filter(i=>i.type==='video').length}document.addEventListener('click',e=>{const b=e.target.closest('[data-filter]');if(!b)return;filter=b.dataset.filter;document.querySelectorAll('[data-filter]').forEach(x=>x.classList.toggle('active',x.dataset.filter===filter));render()});q.addEventListener('input',render);fetch('./data/collection.json?ts='+Date.now()).then(r=>r.json()).then(d=>{items=d.items||[];render()}).catch(()=>{empty.textContent='数据加载失败，请检查 data/collection.json';empty.classList.remove('hidden')});
</script>
</body>
</html>
