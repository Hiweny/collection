<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>雪线之上 · 本地媒体收藏夹</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="wrap">
<header class="top"><div class="brand"><div class="logo"></div><div><b>雪线之上</b><span>Local Media Collection</span></div></div><div class="top-actions"><button data-filter="all" class="pill active">全部</button><button data-filter="image" class="pill">图片</button><button data-filter="video" class="pill">视频</button></div></header>
<section class="hero"><div class="hero-main card"><span class="eyebrow">ABOVE THE SNOWLINE</span><h1>收藏风经过的链接</h1><p>粘贴抖音、小红书或聚合平台分享链接，调用 BugPk 免费 API 解析；也可以直接粘贴图片 URL。收藏保存在浏览器本地，支持导入和导出。</p></div><aside class="side card"><div><strong id="total">0</strong><span>全部收藏</span></div><div><strong id="imgs">0</strong><span>图片</span></div><div><strong id="vids">0</strong><span>视频</span></div></aside></section>
<section class="parser card"><h2>添加收藏</h2><textarea id="source" placeholder="粘贴分享文案 / 抖音链接 / 小红书链接 / 图片 URL"></textarea><div class="parser-row"><select id="api"><option value="auto">自动选择接口</option><option value="douyin">抖音 API</option><option value="xhs">小红书 API</option><option value="short">短视频聚合 API</option><option value="direct-image">直接图片 URL</option></select><button id="parseBtn" class="btn primary">解析并收藏</button><button id="manualBtn" class="btn">手动收藏</button></div><p id="status" class="hint">接口：api.bugpk.com。若浏览器跨域失败，可把链接发给雨檐代解析。</p></section>
<section><div class="toolbar"><input id="q" class="input" placeholder="搜索标题、平台、链接……"><div><button id="exportBtn" class="pill">导出 JSON</button><label class="pill file">导入 JSON<input id="importFile" type="file" accept="application/json"></label><button id="clearBtn" class="pill danger">清空</button></div></div><div id="grid" class="grid"></div><div id="empty" class="empty card">暂无收藏。</div></section>
<p class="foot">长空青 #62909B · 琥珀 #C78444 · 普鲁士蓝 #2C303B · 燕麦色 #AB977E</p>
</div>
<script src="./app.js?v=clear-input-1"></script>
</body>
</html>
